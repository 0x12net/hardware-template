name: "KiCad Rules Check"

on:
  push:
    paths:
      - 'hardware*/*.kicad_pro'
      - 'hardware*/*.kicad_sch'
      - 'hardware*/*.kicad_pcb'
      - 'hardware*/*.kicad_dru'
  pull_request:
    paths:
      - 'hardware*/*.kicad_pro'
      - 'hardware*/*.kicad_sch'
      - 'hardware*/*.kicad_pcb'
      - 'hardware*/*.kicad_dru'

jobs:
  Checking:
    runs-on: ubuntu-latest
    container: ghcr.io/0x12net/kici:10
    steps:
    - name: Check out repository code
      uses: actions/checkout@v7

    - name: Run ERC
      if: success() || failure()
      run: kicadRulesCheck.sh -e

    - name: Run DRC
      if: success() || failure()
      run: kicadRulesCheck.sh -d
